{% extends 'base.html' %}

{% block title %}Yangi buyurtma{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-4">Yangi buyurtma yaratish</h1>

{% if error %}
    <div class="bg-red-100 text-red-700 p-2 rounded mb-4">{{ error }}</div>
{% endif %}

<form method="post" class="bg-white shadow rounded p-4 flex flex-col gap-4 max-w-xl">
    {% csrf_token %}
    <div>
        <label class="block mb-1 font-semibold">Sarlavha</label>
        <input type="text" name="title" required class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>
    <div>
        <label class="block mb-1 font-semibold">Tavsif</label>
        <textarea name="description" required class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
    </div>
    <div>
        <label class="block mb-1 font-semibold">Boshlang‘ich byudjet (so'm)</label>
        <input type="number" name="budget" required class="w-full border rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
    </div>
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Yaratish</button>
</form>
{% endblock %}
