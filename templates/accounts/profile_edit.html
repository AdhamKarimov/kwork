<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilni tahrirlash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: white; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, textarea, select { background: rgba(15, 23, 42, 0.8) !important; color: white !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">

    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/10 blur-[120px] rounded-full"></div>
    </div>

    <div class="glass-card w-full max-w-2xl rounded-[3rem] p-8 md:p-12 shadow-2xl relative z-10">
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-black mb-2">Profilni yangilash</h1>
            <p class="text-gray-500 text-sm font-medium uppercase tracking-[0.2em]">O'zingiz haqingizda gapirib bering</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <div class="flex flex-col items-center mb-8">
                <div class="relative group cursor-pointer">
                    <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full blur opacity-25 group-hover:opacity-100 transition duration-1000"></div>
                    <img id="preview" src="{% if request.user.avatar %}{{ request.user.avatar.url }}{% else %}/static/default.png{% endif %}"
                         class="relative w-24 h-24 rounded-full object-cover border-2 border-white/10">
                    <label for="avatar-upload" class="absolute inset-0 flex items-center justify-center bg-black/50 rounded-full opacity-0 group-hover:opacity-100 transition-all">
                        <span class="text-[10px] font-bold">O'ZGARTIRISH</span>
                    </label>
                    <input type="file" name="avatar" id="avatar-upload" class="hidden" onchange="previewImage(event)">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest ml-1">To'liq ismingiz</label>
                    <input type="text" name="full_name" value="{{ request.user.full_name }}" required
                           class="w-full border border-white/5 p-4 rounded-2xl mt-2 outline-none focus:border-blue-500 transition-all">
                </div>

                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest ml-1">Bio (O'zingiz haqingizda)</label>
                    <textarea name="bio" rows="4" placeholder="Tajribangiz va qiziqishlaringiz..."
                              class="w-full border border-white/5 p-4 rounded-2xl mt-2 outline-none focus:border-blue-500 transition-all resize-none">{{ profile.bio }}</textarea>
                </div>

                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-blue-400 uppercase tracking-widest ml-1">Ko'nikmalar (Vergul bilan ajrating)</label>
                    <input type="text" name="skills" value="{{ skills_str }}" placeholder="Python, Django, React..."
                           class="w-full border border-white/5 p-4 rounded-2xl mt-2 outline-none focus:border-blue-500 transition-all">
                </div>
            </div>

            <div class="flex gap-4 pt-6">
                <a href="{% url 'accounts:profile_detail' request.user.id %}"
                   class="w-1/3 bg-white/5 hover:bg-white/10 text-white font-bold py-4 rounded-2xl text-center transition-all border border-white/5">
                    Bekor qilish
                </a>
                <button type="submit" class="flex-1 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-600/20 transition-all active:scale-95">
                    Saqlash
                </button>
            </div>
        </form>
    </div>

    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('preview');
                output.src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>
</body>
</html>
