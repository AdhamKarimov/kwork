<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Email tasdiqlash</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md text-center">

    <h2 class="text-xl font-bold mb-4">Kod yuborildi</h2>
    <p class="mb-4 text-gray-600">{{ email }}</p>

    {% if error %}
        <div class="bg-red-100 text-red-600 p-2 rounded mb-4">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="code" maxlength="6"
               class="w-full p-3 border rounded text-center text-2xl tracking-widest mb-4">

        <button class="w-full bg-green-500 text-white p-3 rounded">
            Tasdiqlash
        </button>
    </form>

    <a href="{% url 'accounts:resend_code' %}"
       class="block mt-4 text-blue-500">
        Kodni qayta yuborish
    </a>

</div>

</body>
</html>
