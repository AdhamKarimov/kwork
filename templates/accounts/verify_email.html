<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasdiqlash | Kwork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-sm border border-slate-100 text-center">
        <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 19v-8.93a2 2 0 01.89-1.664l7-4.666a2 2 0 012.22 0l7 4.666A2 2 0 0121 10.07V19M3 19a2 2 0 002 2h14a2 2 0 002-2M3 19l6.75-4.5M21 19l-6.75-4.5M3 10l6.75 4.5M21 10l-6.75 4.5m0 0l-1.14.76a2 2 0 01-2.22 0l-1.14-.76" />
            </svg>
        </div>

        <h2 class="text-2xl font-bold text-slate-900 mb-2">Emailni tasdiqlang</h2>
        <p class="text-slate-500 text-sm mb-8">Biz <b>{{ email }}</b> pochtasiga 6 xonali kod yubordik.</p>

        {% if error %}
        <p class="mb-4 text-red-500 text-sm font-medium">{{ error }}</p>
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <input type="text" name="code" maxlength="6" placeholder="000000" required
                class="w-full text-center text-3xl tracking-[0.5em] font-bold py-3 border-2 border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">
                Kodni tasdiqlash
            </button>
        </form>

        <div class="mt-8 border-t pt-6">
            <p class="text-xs text-slate-400 uppercase font-semibold tracking-wider mb-2">Kod kelmadimi?</p>
            <a href="{% url 'accounts:resend_code' %}" class="text-blue-600 font-bold hover:text-blue-800 transition">
                Qayta yuborish
            </a>
        </div>
    </div>
</body>
</html>
