<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish | Kwork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Radio tanlangan state */
        input[type="radio"]:checked + span {
            background-color: #22c55e; /* green-500 */
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-10 sm:p-12 rounded-3xl shadow-xl w-full max-w-md border border-slate-200">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900">Kwork</h1>
            <p class="text-slate-500 mt-2 text-base sm:text-lg">O'z loyihangizni bugun boshlang</p>
        </div>

        {% if error %}
        <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm rounded-md">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">To'liq ism-sharif</label>
                <input type="text" name="full_name" placeholder="Masalan: Ali Valiyev" required
                    class="w-full px-5 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition shadow-sm hover:shadow-md">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email manzilingiz</label>
                <input type="email" name="email" placeholder="example@mail.com" required
                    class="w-full px-5 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition shadow-sm hover:shadow-md">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Parol</label>
                <input type="password" name="password" placeholder="••••••••" required
                    class="w-full px-5 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition shadow-sm hover:shadow-md">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-3">Sizning rolingiz</label>
                <div class="grid grid-cols-2 gap-4">
                    <label class="flex items-center justify-center p-3 border rounded-xl cursor-pointer transition hover:bg-slate-50">
                        <input type="radio" name="role" value="CLIENT" class="hidden" checked>
                        <span class="w-full text-center text-sm text-slate-600 py-2 rounded-xl border border-slate-300">Mijoz</span>
                    </label>
                    <label class="flex items-center justify-center p-3 border rounded-xl cursor-pointer transition hover:bg-slate-50">
                        <input type="radio" name="role" value="FREELANCER" class="hidden">
                        <span class="w-full text-center text-sm text-slate-600 py-2 rounded-xl border border-slate-300">Frilanser</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-3 rounded-xl font-bold hover:from-green-600 hover:to-green-700 transform active:scale-95 transition shadow-lg shadow-green-200">
                Hisob yaratish
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-600">
            Akkauntingiz bormi? <a href="{% url 'accounts:login' %}" class="text-green-600 font-bold hover:underline">Kirish</a>
        </p>
    </div>
</body>
</html>
