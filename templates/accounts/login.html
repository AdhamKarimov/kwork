<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | Kwork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <h2 class="text-3xl font-extrabold text-slate-900 text-center mb-2">Xush kelibsiz</h2>
        <p class="text-slate-500 text-center mb-8">Tizimga kirish uchun ma'lumotlarni kiriting</p>

        {% if error %}
        <div class="mb-6 p-4 bg-orange-50 border-l-4 border-orange-500 text-orange-700 text-sm italic">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email</label>
                <input type="email" name="email" placeholder="example@mail.com" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition">
            </div>
            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-semibold text-slate-700">Parol</label>
                    <a href="#" class="text-xs text-green-600 hover:underline">Parolni unutdingizmi?</a>
                </div>
                <input type="password" name="password" placeholder="••••••••" required
                    class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition">
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-black transform active:scale-[0.98] transition">
                Kirish
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-slate-600">
            Hali akkauntingiz yo'qmi? <a href="{% url 'accounts:register' %}" class="text-green-600 font-bold hover:underline">Ro'yxatdan o'ting</a>
        </p>
    </div>
</body>
</html>
